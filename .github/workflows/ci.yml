name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: eslint plugin tests (node:test)
        run: cd eslint && npm ci && node --test

      - name: install ast-grep CLI
        run: npm i -g @ast-grep/cli

      - name: ast-grep rule tests
        run: cd ast-grep && ast-grep test

      - name: biome flags the expected sites (operators + ranges)
        run: |
          out=$(npx --yes @biomejs/biome lint --config-path biome/biome.json fixtures/sample.js 2>&1 || true)
          ops=$(printf '%s' "$out" | grep -c 'Flip it')
          ranges=$(printf '%s' "$out" | grep -c 'Order this range')
          echo "biome flagged $ops operator sites and $ranges range sites"
          # no-greater-than.grit -> 12 operator diagnostics; number-line-range.grit -> >=1 scrambled range
          if [ "$ops" -ne 12 ]; then
            echo "Expected 12 operator diagnostics (Flip it), got $ops" >&2
            exit 1
          fi
          if [ "$ranges" -lt 1 ]; then
            echo "Expected >=1 range diagnostic (Order this range), got $ranges" >&2
            exit 1
          fi

      - name: EXAMPLES.md is fresh vs fixtures/cases.json
        run: |
          node scripts/gen-examples.mjs
          git diff --exit-code EXAMPLES.md

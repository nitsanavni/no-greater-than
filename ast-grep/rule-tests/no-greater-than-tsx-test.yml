id: no-greater-than-tsx
valid:
  # JSX elements and arrow-generics must NOT be matched as comparisons
  - "const el = <Foo x={1} />"
  - "function f<T,>(x: T) { return x; }"
  - "a < b"
  # Assignment / await operands are left to the impure rule (would reorder).
  - "(x = expr) > 0"
  - "async () => (await p) > 0"
invalid:
  - "a > b"

id: number-line-range-loincl
valid:
  # Already canonical: left alone.
  - "5 <= x && x < 10"
  - "lo <= x && x < hi"
  # Not a two-sided range over a single variable.
  - "a < b && c < d"
  - "x < 5 || x > 10"
  - "x > 5 && y < 10"
  # Side-effecting operands are NOT auto-fixed here; the detect-only
  # `number-line-range-loincl-impure` rule reports them instead.
  - "f() >= 5 && f() < 10"
  - "x >= 5 && x < f()"
invalid:
  # Both scrambled permutations -> canonical `lo <= x && x < hi`.
  - "x >= 5 && x < 10"
  - "x < 10 && x >= 5"
  - "a >= lo && a < hi"
  # Lower bound already canonical (`lo <= x`) but the upper-bound clause has the
  # variable on the wrong side (`hi > x` instead of `x < hi`). eslint folds
  # these into the same `lo <= x && x < hi` range; ast-grep must too.
  - "5 <= x && 10 > x"
  - "10 > x && 5 <= x"
  - "0 <= i && source.length > i"

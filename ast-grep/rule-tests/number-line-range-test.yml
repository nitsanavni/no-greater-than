id: number-line-range
valid:
  # Already canonical: ascending number line, left alone.
  - "5 < x && x < 10"
  - "lo < x && x < hi"
  # Not a two-sided range over a single variable.
  - "a < b && c < d"
  - "x > 5 || x < 10"
  - "x > 5 && y < 10"
  # Side-effecting operands are NOT auto-fixed here; the detect-only
  # `number-line-range-impure` rule reports them instead.
  - "f() > 5 && f() < 10"
  - "x > 5 && x < f()"
  - "x++ > 5 && x < 10"
invalid:
  # Both scrambled `&&` permutations -> canonical `lo < x && x < hi`.
  - "x > 5 && x < 10"
  - "x < 10 && x > 5"
  - "a > lo && a < hi"

id: number-line-range-incl-tsx-impure
valid:
  # Pure ranges are handled (and auto-fixed) by `number-line-range-incl-tsx`, not here.
  - "x >= 5 && x <= 10"
  - "x <= 10 && x >= 5"
  - "a >= lo && a <= hi"
  - "5 <= x && x <= 10"
  # Not a two-sided range at all.
  - "a < b && c < d"
invalid:
  # A side effect in a BOUND operand still matches, so reported detect-only.
  - "f() >= 5 && f() <= 10"
  - "x >= 5 && x <= f()"
  - "x >= f() && x <= 10"

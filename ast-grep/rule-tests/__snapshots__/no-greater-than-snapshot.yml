id: no-greater-than
snapshots:
  (a || b) > c:
    fixed: (c) < ((a || b))
    labels:
    - source: (a || b) > c
      style: primary
      start: 0
      end: 12
  a + 1 > b * 2:
    fixed: (b * 2) < (a + 1)
    labels:
    - source: a + 1 > b * 2
      style: primary
      start: 0
      end: 13
  a > b:
    fixed: (b) < (a)
    labels:
    - source: a > b
      style: primary
      start: 0
      end: 5
  foo() > b:
    fixed: (b) < (foo())
    labels:
    - source: foo() > b
      style: primary
      start: 0
      end: 9
  foo.bar > 10:
    fixed: (10) < (foo.bar)
    labels:
    - source: foo.bar > 10
      style: primary
      start: 0
      end: 12
  x > 5:
    fixed: (5) < (x)
    labels:
    - source: x > 5
      style: primary
      start: 0
      end: 5

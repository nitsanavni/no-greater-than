id: number-line-range-ts
language: TypeScript
severity: warning
message: "Order as a number line: lo < x && x < hi."
note: |
  A two-sided "between" test reads clearest as an ascending number line:
  `lo < x && x < hi`. Both scrambled orderings below carry the same boolean,
  so we normalise them to the canonical form.

  COVERAGE (fix): both `&&` permutations are covered by a correct fix template
  because both map to the SAME canonical output, so a single non-branching
  template suffices:
    - `$X > $LO && $X < $HI`  ->  `($LO) < ($X) && ($X) < ($HI)`
    - `$X < $HI && $X > $LO`  ->  `($LO) < ($X) && ($X) < ($HI)`
  See number-line-range-or.yml for the `||` (outside) case.
rule:
  any:
    - pattern: $X > $LO && $X < $HI
    - pattern: $X < $HI && $X > $LO
  # AUTOFIX SAFETY: the fix reorders operands, so it would silently change
  # evaluation order if any operand has a side effect. A declarative template
  # can't sequence-guard, so we only auto-fix when the whole expression is
  # demonstrably pure (no call / update / assignment / await anywhere). Ranges
  # with a side-effecting operand are left to the detect-only
  # `number-line-range-ts-impure` rule, which reports but does not fix.
  not:
    has:
      stopBy: end
      any:
        - kind: call_expression
        - kind: update_expression
        - kind: assignment_expression
        - kind: await_expression
# Always-parenthesize: a declarative template can't decide *when* parens are
# needed, so it wraps each operand unconditionally to stay correct for
# multi-token operands. Redundant parens are harmless and a formatter strips
# them. (See no-greater-than.yml for the full rationale.)
fix: ($LO) < ($X) && ($X) < ($HI)

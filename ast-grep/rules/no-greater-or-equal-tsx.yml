id: no-greater-or-equal-tsx
language: Tsx
severity: warning
message: "Use '<=' so the comparison reads like a number line."
rule:
  pattern: $A >= $B
  # AUTOFIX SAFETY: only fix when both operands are demonstrably pure; calls /
  # updates are left to the detect-only `no-greater-or-equal-tsx-impure` rule.
  not:
    has:
      stopBy: end
      any:
        - kind: call_expression
        - kind: update_expression
fix: ($B) <= ($A)

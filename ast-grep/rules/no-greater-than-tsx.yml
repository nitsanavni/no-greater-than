id: no-greater-than-tsx
language: Tsx
severity: warning
message: "Use '<' so the comparison reads like a number line."
note: |
  TSX variant. Covers .tsx files; JSX elements (<Foo>) and generics are parsed
  as their own node kinds, not binary_expression, so only real `>` comparisons match.
rule:
  pattern: $A > $B
  # AUTOFIX SAFETY: only fix when both operands are demonstrably pure; calls /
  # updates are left to the detect-only `no-greater-than-tsx-impure` rule. See
  # no-greater-than.yml for the full rationale.
  not:
    has:
      stopBy: end
      any:
        - kind: call_expression
        - kind: update_expression
        - kind: assignment_expression
        - kind: await_expression
fix: ($B) < ($A)

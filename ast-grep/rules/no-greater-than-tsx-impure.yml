id: no-greater-than-tsx-impure
language: Tsx
severity: warning
message: "Use '<' so the comparison reads like a number line (manual: an operand has a side effect, so swapping would reorder evaluation)."
note: |
  Detect-only companion to `no-greater-than-tsx`. See no-greater-than-impure.yml.
rule:
  pattern: $A > $B
  has:
    stopBy: end
    any:
      - kind: call_expression
      - kind: update_expression
      - kind: assignment_expression
      - kind: await_expression

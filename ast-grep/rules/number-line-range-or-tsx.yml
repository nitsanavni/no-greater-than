id: number-line-range-or-tsx
language: Tsx
severity: warning
message: "Order as a number line: x < lo || hi < x."
note: |
  A two-sided "outside" test reads clearest as an ascending number line:
  `x < lo || hi < x`. Both scrambled orderings below carry the same boolean,
  so we normalise them to the canonical form.

  COVERAGE (fix): both `||` permutations are covered by a correct fix template
  because both map to the SAME canonical output, so a single non-branching
  template suffices:
    - `$X < $LO || $X > $HI`  ->  `($X) < ($LO) || ($HI) < ($X)`
    - `$X > $HI || $X < $LO`  ->  `($X) < ($LO) || ($HI) < ($X)`
  See number-line-range.yml for the `&&` (between) case.
rule:
  any:
    - pattern: $X < $LO || $X > $HI
    - pattern: $X > $HI || $X < $LO
  # AUTOFIX SAFETY: see number-line-range.yml. The fix reorders operands, so it
  # only runs when the whole expression is demonstrably pure; side-effecting
  # ranges are left to the detect-only `number-line-range-or-tsx-impure` rule.
  not:
    has:
      stopBy: end
      any:
        - kind: call_expression
        - kind: update_expression
        - kind: assignment_expression
        - kind: await_expression
# Always-parenthesize (see no-greater-than.yml for rationale).
fix: ($X) < ($LO) || ($HI) < ($X)

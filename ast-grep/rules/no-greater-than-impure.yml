id: no-greater-than-impure
language: JavaScript
severity: warning
message: "Use '<' so the comparison reads like a number line (manual: an operand has a side effect, so swapping would reorder evaluation)."
note: |
  Detect-only companion to `no-greater-than`. An operand contains a call
  (`foo()`) or update (`i++`), so the order-swapping autofix could change
  evaluation order. There is no `fix:` here — rewrite by hand if the reorder
  is safe.
rule:
  pattern: $A > $B
  has:
    stopBy: end
    any:
      - kind: call_expression
      - kind: update_expression

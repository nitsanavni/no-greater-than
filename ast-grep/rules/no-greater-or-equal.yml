id: no-greater-or-equal
language: JavaScript
severity: warning
message: "Use '<=' so the comparison reads like a number line."
rule:
  pattern: $A >= $B
  # AUTOFIX SAFETY: only fix when both operands are demonstrably pure; calls /
  # updates are left to the detect-only `no-greater-or-equal-impure` rule. See
  # no-greater-than.yml for the full rationale.
  not:
    has:
      stopBy: end
      any:
        - kind: call_expression
        - kind: update_expression
# Always-parenthesize (see no-greater-than.yml for the rationale).
fix: ($B) <= ($A)
